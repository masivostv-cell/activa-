<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACTIVA+ v2.0 - Gaming Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
        }

        .app-bg {
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .xp-bar-fill {
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .module-card {
            transition: all 0.3s ease;
        }

        .module-card:active {
            transform: scale(0.95);
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 1.5rem;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-0 sm:p-4">

    <div id="app-container" class="w-full max-w-md h-screen sm:h-[800px] app-bg sm:rounded-[3rem] overflow-hidden shadow-2xl flex flex-col relative text-white border border-slate-800">
        <!-- Render dinámico aquí -->
    </div>

    <script>
        // --- ESTADO DE LA APP ---
        const state = {
            screen: 'splash',
            xp: 150,
            level: 1,
            waterCount: 0,
            currentModule: null,
            timer: 0,
            isTimerRunning: false,
            completedChallenges: [],
            modules: {
                actividad: {
                    title: "Gym Hero",
                    subtitle: "Actividad Física",
                    icon: "zap",
                    color: "from-orange-500 to-red-500",
                    video: "https://www.youtube.com/embed/6i_9O86Y-Yw",
                    tips: ["Evita estar sentado más de 1 hora.", "Sube escaleras en lugar de usar ascensor.", "Baila 15 minutos tu canción favorita."],
                    challenge: "¡Haz 10 sentadillas ahora mismo!"
                },
                alimentacion: {
                    title: "Food Master",
                    subtitle: "Alimentación",
                    icon: "utensils",
                    color: "from-emerald-500 to-teal-500",
                    video: "https://www.youtube.com/embed/3nIAsD6tX6U",
                    tips: ["Tu plato debe ser colorido como un arcoíris.", "Reduce el azúcar, tu cerebro lo agradecerá.", "Cambia snacks procesados por fruta fresca."],
                    challenge: "¿Cuántos colores tiene tu almuerzo hoy?"
                },
                hidratacion: {
                    title: "H2O Boss",
                    subtitle: "Hidratación",
                    icon: "droplet",
                    color: "from-blue-500 to-indigo-500",
                    video: "https://www.youtube.com/embed/ZidGoz9fOls",
                    tips: ["Beber agua mejora tu concentración.", "No esperes a tener sed.", "El agua natural es el mejor combustible."],
                    challenge: "Registra tus 8 vasos de hoy."
                },
                descanso: {
                    title: "Zen Mode",
                    subtitle: "Descanso",
                    icon: "moon",
                    color: "from-purple-500 to-pink-500",
                    video: "https://www.youtube.com/embed/6_6p9Z6U1iM",
                    tips: ["Apaga pantallas 30 min antes de dormir.", "Dormir ayuda a memorizar lo que estudiaste.", "Crea una rutina relajante nocturna."],
                    challenge: "Deja el móvil fuera de tu cama esta noche."
                }
            }
        };

        const container = document.getElementById('app-container');

        function navigate(screen, params = null) {
            state.screen = screen;
            if (params) state.currentModule = params;
            render();
        }

        function addXP(amount) {
            state.xp += amount;
            if (state.xp >= state.level * 500) {
                state.level++;
            }
            render();
        }

        // --- PANTALLAS ---

        function renderSplash() {
            container.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center bg-gradient-to-br from-green-400 to-blue-600">
                    <div class="mb-12 floating">
                        <div class="w-32 h-32 bg-white rounded-[2.5rem] flex items-center justify-center shadow-2xl mx-auto mb-6">
                            <i data-lucide="activity" class="w-16 h-16 text-green-500"></i>
                        </div>
                        <h1 class="text-5xl font-extrabold tracking-tighter">ACTIVA+</h1>
                        <p class="text-white/80 font-medium">LEVEL UP YOUR HEALTH</p>
                    </div>
                    
                    <button onclick="navigate('home')" class="w-full max-w-xs bg-white text-slate-900 font-bold py-5 rounded-2xl shadow-xl transform active:scale-95 transition-all text-xl uppercase tracking-widest">
                        ¡Entrar al juego!
                    </button>
                    <p class="mt-6 text-white/60 text-xs">Daniela Contreras & Gabriela Vega</p>
                </div>
            `;
            lucide.createIcons();
        }

        function renderHome() {
            container.innerHTML = `
                <div class="flex-1 flex flex-col overflow-y-auto">
                    <!-- Header -->
                    <div class="p-6 pb-2">
                        <div class="flex justify-between items-center mb-6">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 bg-gradient-to-tr from-yellow-400 to-orange-500 rounded-full flex items-center justify-center shadow-lg font-bold text-slate-900">
                                    LV ${state.level}
                                </div>
                                <div>
                                    <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Player 1</p>
                                    <p class="font-bold text-lg leading-none">Healthy Legend</p>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button class="w-10 h-10 glass-card rounded-full flex items-center justify-center"><i data-lucide="bell" class="w-5 h-5"></i></button>
                                <button class="w-10 h-10 glass-card rounded-full flex items-center justify-center"><i data-lucide="settings" class="w-5 h-5"></i></button>
                            </div>
                        </div>

                        <!-- XP Progress -->
                        <div class="glass-card p-4 rounded-3xl mb-6 border-white/5">
                            <div class="flex justify-between text-xs mb-2">
                                <span class="text-slate-400 font-bold">PROGRESO DE NIVEL</span>
                                <span class="text-yellow-400 font-bold">${state.xp} / ${state.level * 500} XP</span>
                            </div>
                            <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden">
                                <div class="xp-bar-fill h-full bg-gradient-to-r from-yellow-400 to-green-500" style="width: ${(state.xp / (state.level * 500)) * 100}%"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Water Tracker Mini-tool -->
                    <div class="px-6 mb-8">
                        <div class="bg-blue-600/20 border border-blue-500/30 p-5 rounded-[2rem] flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-blue-500 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                                    <i data-lucide="droplet" class="text-white"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-bold">H2O Tracker</p>
                                    <p class="text-xs text-blue-300">${state.waterCount} de 8 vasos hoy</p>
                                </div>
                            </div>
                            <button onclick="addWater()" class="bg-blue-500 hover:bg-blue-400 p-3 rounded-2xl transition-all active:scale-90">
                                <i data-lucide="plus" class="w-6 h-6"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Modules Grid -->
                    <div class="px-6 pb-20">
                        <h2 class="text-xl font-bold mb-4">Módulos de Poder</h2>
                        <div class="grid grid-cols-2 gap-4">
                            ${Object.keys(state.modules).map(key => {
                                const mod = state.modules[key];
                                return `
                                    <button onclick="navigate('module', '${key}')" class="module-card glass-card p-5 rounded-[2rem] text-left border-white/5 relative overflow-hidden">
                                        <div class="absolute -right-2 -bottom-2 opacity-10">
                                            <i data-lucide="${mod.icon}" class="w-20 h-20"></i>
                                        </div>
                                        <div class="w-10 h-10 bg-gradient-to-br ${mod.color} rounded-xl flex items-center justify-center mb-3 shadow-lg">
                                            <i data-lucide="${mod.icon}" class="w-5 h-5 text-white"></i>
                                        </div>
                                        <p class="font-extrabold text-sm">${mod.title}</p>
                                        <p class="text-[10px] text-slate-400 uppercase font-bold tracking-tighter">${mod.subtitle}</p>
                                    </button>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>

                <!-- Floating CTA -->
                <div class="absolute bottom-6 left-6 right-6">
                    <button onclick="navigate('quiz')" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-2xl shadow-xl shadow-indigo-600/30 flex items-center justify-center gap-3">
                        <i data-lucide="award"></i> EVALUACIÓN FINAL
                    </button>
                </div>
            `;
            lucide.createIcons();
        }

        function renderModule() {
            const mod = state.modules[state.currentModule];
            container.innerHTML = `
                <div class="flex-1 flex flex-col overflow-y-auto">
                    <!-- Top Bar -->
                    <div class="p-6 flex items-center justify-between sticky top-0 bg-slate-900/80 backdrop-blur-md z-10">
                        <button onclick="navigate('home')" class="w-10 h-10 glass-card rounded-full flex items-center justify-center"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                        <h2 class="font-black text-lg uppercase tracking-widest">${mod.title}</h2>
                        <div class="w-10"></div>
                    </div>

                    <div class="px-6 pb-6">
                        <!-- Video Area -->
                        <div class="video-container mb-6 shadow-2xl border border-white/10">
                            <iframe src="${mod.video}" frameborder="0" allowfullscreen></iframe>
                        </div>

                        <!-- Info Tabs -->
                        <div class="space-y-4 mb-8">
                            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Secretos de Pro</h3>
                            ${mod.tips.map(tip => `
                                <div class="glass-card p-4 rounded-2xl flex items-center gap-4">
                                    <div class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]"></div>
                                    <p class="text-sm text-slate-200">${tip}</p>
                                </div>
                            `).join('')}
                        </div>

                        <!-- Mini Challenge Card -->
                        <div class="bg-gradient-to-br ${mod.color} p-6 rounded-[2.5rem] shadow-xl relative overflow-hidden group">
                            <div class="relative z-10">
                                <div class="flex items-center gap-3 mb-2">
                                    <i data-lucide="star" class="w-5 h-5 fill-white"></i>
                                    <p class="text-xs font-black uppercase tracking-tighter text-white/80">RETO FLASH</p>
                                </div>
                                <p class="text-xl font-bold mb-4">${mod.challenge}</p>
                                <button onclick="completeChallenge()" class="bg-white text-slate-900 px-6 py-3 rounded-xl font-black text-sm uppercase transition-all hover:px-8">
                                    ¡Lo hice! (+50 XP)
                                </button>
                            </div>
                            <i data-lucide="flame" class="absolute -right-4 -bottom-4 w-24 h-24 text-white/10 group-hover:scale-125 transition-transform"></i>
                        </div>

                        <!-- Timer for Activity -->
                        ${state.currentModule === 'actividad' ? `
                            <div class="mt-4 glass-card p-6 rounded-[2rem] text-center">
                                <p class="text-xs text-slate-400 font-bold mb-2">CRONÓMETRO DE MOVIMIENTO</p>
                                <div class="text-4xl font-mono font-black mb-4">${formatTime(state.timer)}</div>
                                <button onclick="toggleTimer()" class="bg-orange-500 px-8 py-3 rounded-full font-bold">
                                    ${state.isTimerRunning ? 'PAUSAR' : 'INICIAR 5 MIN'}
                                </button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // --- LÓGICA DE HERRAMIENTAS ---

        function addWater() {
            if (state.waterCount < 8) {
                state.waterCount++;
                addXP(25);
            }
        }

        function completeChallenge() {
            addXP(50);
            navigate('home');
        }

        function formatTime(s) {
            const min = Math.floor(s / 60);
            const sec = s % 60;
            return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        let timerInterval;
        function toggleTimer() {
            if (state.isTimerRunning) {
                clearInterval(timerInterval);
                state.isTimerRunning = false;
            } else {
                if (state.timer === 0) state.timer = 300; // 5 min
                state.isTimerRunning = true;
                timerInterval = setInterval(() => {
                    if (state.timer > 0) {
                        state.timer--;
                        render();
                    } else {
                        clearInterval(timerInterval);
                        state.isTimerRunning = false;
                        addXP(100);
                        render();
                    }
                }, 1000);
            }
            render();
        }

        // --- QUIZ Y EVALUACIÓN ---
        
        function renderQuiz() {
            // Reusamos la estructura de la versión anterior pero con estilo gamer
            container.innerHTML = `
                <div class="flex-1 flex flex-col p-8 items-center justify-center text-center">
                    <div class="w-24 h-24 bg-indigo-500/20 text-indigo-400 rounded-3xl flex items-center justify-center mb-8 rotate-12">
                        <i data-lucide="brain" class="w-12 h-12"></i>
                    </div>
                    <h2 class="text-3xl font-black mb-4">MODO BOSS FIGHT</h2>
                    <p class="text-slate-400 mb-10">Responde 5 preguntas épicas para ganar la medalla de salud.</p>
                    
                    <button onclick="startFinalQuiz()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 py-5 rounded-2xl font-black text-xl shadow-xl">
                        EMPEZAR DESAFÍO
                    </button>
                </div>
            `;
            lucide.createIcons();
        }

        function startFinalQuiz() {
            state.quizStep = 0;
            state.quizScore = 0;
            navigate('quiz-step');
        }

        const quizData = [
            { q: "¿Cuánta agua necesita tu cerebro al día?", a: ["1 vaso", "8 vasos", "Solo gaseosa"], c: 1 },
            { q: "¿Qué pasa si duermes bien antes de un examen?", a: ["Se te olvida todo", "Mejoras memoria", "Te da sueño en clase"], c: 1 },
            { q: "El ejercicio ayuda a...", a: ["Estar estresado", "Mejorar el ánimo", "Dormir menos"], c: 1 },
            { q: "Un snack saludable sería...", a: ["Unos chips", "Una manzana", "Una barra de chocolate"], c: 1 },
            { q: "¿Cuánto tiempo de pantalla se recomienda antes de dormir?", a: ["Cero min", "Dos horas", "Toda la noche"], c: 0 }
        ];

        function renderQuizStep() {
            const question = quizData[state.quizStep];
            container.innerHTML = `
                <div class="flex-1 flex flex-col p-6">
                    <div class="mb-12">
                        <div class="flex justify-between text-xs font-bold text-indigo-400 mb-2">
                            <span>PREGUNTA ${state.quizStep + 1} / 5</span>
                            <span>+100 XP POR RESPUESTA</span>
                        </div>
                        <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                            <div class="h-full bg-indigo-500 transition-all" style="width: ${((state.quizStep + 1) / 5) * 100}%"></div>
                        </div>
                    </div>

                    <h3 class="text-2xl font-black text-center mb-12">${question.q}</h3>

                    <div class="space-y-4">
                        ${question.a.map((opt, i) => `
                            <button onclick="checkAnswer(${i})" class="w-full p-5 glass-card rounded-2xl text-left font-bold hover:bg-white/10 transition-all flex items-center gap-4">
                                <span class="w-8 h-8 bg-slate-800 rounded-lg flex items-center justify-center text-indigo-400">${i + 1}</span>
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function checkAnswer(idx) {
            if (idx === quizData[state.quizStep].c) {
                state.quizScore++;
                addXP(100);
            }
            if (state.quizStep < 4) {
                state.quizStep++;
                render();
            } else {
                navigate('results');
            }
        }

        function renderResults() {
            const win = state.quizScore >= 4;
            container.innerHTML = `
                <div class="flex-1 flex flex-col p-8 items-center justify-center text-center">
                    <div class="mb-8 floating">
                        <i data-lucide="${win ? 'trophy' : 'refresh-cw'}" class="w-24 h-24 ${win ? 'text-yellow-400' : 'text-blue-400'}"></i>
                    </div>
                    <h2 class="text-4xl font-black mb-2">${win ? '¡LEGENDARIO!' : '¡SIGUE ENTRENANDO!'}</h2>
                    <p class="text-slate-400 mb-8">Acertaste ${state.quizScore} de 5 preguntas.</p>
                    
                    <div class="glass-card p-6 rounded-[2rem] w-full mb-8">
                        <p class="text-xs font-bold text-yellow-500 uppercase mb-2">Recompensa</p>
                        <p class="text-2xl font-black">+${state.quizScore * 100} XP TOTAL</p>
                    </div>

                    <button onclick="navigate('home')" class="w-full bg-white text-slate-900 font-black py-4 rounded-2xl text-lg">
                        CONTINUAR MI AVENTURA
                    </button>
                </div>
            `;
            lucide.createIcons();
        }

        // --- RENDERIZADO PRINCIPAL ---

        function render() {
            switch(state.screen) {
                case 'splash': renderSplash(); break;
                case 'home': renderHome(); break;
                case 'module': renderModule(); break;
                case 'quiz': renderQuiz(); break;
                case 'quiz-step': renderQuizStep(); break;
                case 'results': renderResults(); break;
            }
        }

        window.onload = render;
    </script>
</body>
</html>
