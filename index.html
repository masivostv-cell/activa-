<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACTIVA+ | Aprendizaje Interactivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            color: white;
            user-select: none;
        }

        .app-bg {
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 1.5rem;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .module-animate {
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-progress {
            animation: progress 2s infinite ease-in-out;
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 0%; }
        }

        .author-footer {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            text-align: center;
            padding: 15px 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-0 sm:p-4 text-white">

    <div id="app-container" class="w-full max-w-md h-screen sm:h-[800px] app-bg sm:rounded-[3rem] overflow-hidden shadow-2xl flex flex-col relative border border-slate-800">
        <!-- Contenido Dinámico -->
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyBVk16-Afr6XS8mG_Sky_on9Ry33Le9xN0",
                authDomain: "activa-40ada.firebaseapp.com",
                projectId: "activa-40ada",
                storageBucket: "activa-40ada.firebasestorage.app",
                messagingSenderId: "685779884426",
                appId: "1:685779884426:web:f36984f2f61c4804e29073"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'activa-plus-v4';

        window.state = {
            user: null,
            screen: 'loading',
            error: null,
            currentModule: null,
            profile: {
                name: "", weight: 0, targetWeight: 0, xp: 0, level: 1,
                calendar: Array(30).fill(false),
                completedModules: []
            }
        };

        // URLs de YouTube estándar para máxima compatibilidad
        const moduleData = {
            actividad: {
                title: "Actividad Física",
                video: "https://www.youtube.com/embed/40wofiD9p_A",
                icon: "zap",
                color: "from-orange-500 to-red-500",
                tips: ["Mejora la resistencia física.", "Fortalece tus huesos.", "Reduce el estrés.", "Mínimo 60 min al día."],
                activity: "Realiza 20 saltos de tijera ahora mismo."
            },
            comida: {
                title: "Alimentación Saludable",
                video: "https://www.youtube.com/embed/bnmUouTftX0",
                icon: "apple",
                color: "from-red-500 to-pink-500",
                tips: ["Plato colorido (arcoíris).", "Evita ultraprocesados.", "Frutas como snack.", "La fibra es tu aliada."],
                activity: "Planifica 3 frutas para comer esta semana."
            },
            agua: {
                title: "Hidratación",
                video: "https://www.youtube.com/embed/b7AAHNUTK7U",
                icon: "droplet",
                color: "from-blue-500 to-cyan-500",
                tips: ["Mantiene el cerebro enfocado.", "No esperes a tener sed.", "Evita gaseosas.", "Meta: 8 vasos diarios."],
                activity: "Toma un vaso de agua natural ahora."
            },
            descanso: {
                title: "Descanso",
                video: "https://www.youtube.com/embed/LsMUYy8KUbc",
                icon: "moon",
                color: "from-purple-500 to-indigo-500",
                tips: ["Mejora la memoria.", "Apaga pantallas antes de dormir.", "Crecimiento nocturno.", "Duerma 8-10 horas."],
                activity: "Pon una alarma de 'Desconexión Digital'."
            }
        };

        const init = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        window.state.user = user;
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'profile');
                        onSnapshot(docRef, (docSnap) => {
                            if (docSnap.exists()) {
                                window.state.profile = docSnap.data();
                                navigate('home');
                            } else {
                                navigate('onboarding');
                            }
                        }, (err) => {
                            console.error("Error en Firestore:", err);
                            window.state.error = "Error de acceso a datos.";
                            render();
                        });
                    }
                });
            } catch (e) {
                window.state.error = "Error al conectar con Firebase.";
                render();
            }
        };

        window.navigate = (screen, params = null) => {
            window.state.screen = screen;
            if (params) window.state.currentModule = params;
            render();
        };

        window.saveProfile = async (data) => {
            if (!window.state.user) return;
            const newProfile = { ...window.state.profile, ...data };
            await setDoc(doc(db, 'artifacts', appId, 'users', window.state.user.uid, 'data', 'profile'), newProfile);
        };

        const getAuthorFooter = (isLight = false) => `
            <div class="author-footer" style="${isLight ? 'color: rgba(0,0,0,0.3)' : ''}">
                <div class="flex items-center gap-1 opacity-50">
                    <i data-lucide="activity" class="w-3 h-3 ${isLight ? 'text-green-600' : 'text-green-500'}"></i>
                    <span class="font-black tracking-widest uppercase" style="font-size: 8px;">ACTIVA+</span>
                </div>
                <p>Daniela Contreras & Gabriela Vega</p>
            </div>
        `;

        const render = () => {
            const container = document.getElementById('app-container');
            const p = window.state.profile;

            if (window.state.error) {
                container.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center p-8 text-center">
                        <i data-lucide="alert-circle" class="text-red-500 w-16 h-16 mb-4"></i>
                        <h2 class="text-2xl font-black mb-2 uppercase">Error</h2>
                        <p class="text-slate-400 text-sm mb-8">${window.state.error}</p>
                        <button onclick="location.reload()" class="bg-white text-slate-900 px-6 py-3 rounded-xl font-bold">REINTENTAR</button>
                    </div>
                `;
            }

            else if (window.state.screen === 'loading') {
                container.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center p-8 bg-slate-900">
                        <div class="animate-bounce w-20 h-20 bg-white rounded-[2rem] flex items-center justify-center shadow-2xl mb-6">
                            <i data-lucide="activity" class="text-green-500 w-10 h-10"></i>
                        </div>
                        <h1 class="text-3xl font-black mb-4 tracking-tighter uppercase">ACTIVA+</h1>
                        <div class="w-48 bg-slate-800 h-1.5 rounded-full overflow-hidden mb-12">
                            <div class="h-full bg-green-500 animate-progress"></div>
                        </div>
                        <div class="absolute bottom-4 w-full">
                            ${getAuthorFooter()}
                        </div>
                    </div>
                `;
            }

            else if (window.state.screen === 'onboarding') {
                container.innerHTML = `
                    <div class="flex-1 flex flex-col p-8 bg-white text-slate-900 overflow-y-auto no-scrollbar">
                        <h2 class="text-4xl font-black mb-2 leading-tight">¡Hola!<br>Explorador</h2>
                        <p class="text-slate-500 mb-8 font-medium">Hagamos tu diagnóstico inicial de salud.</p>
                        <div class="space-y-6 mb-12">
                            <input id="ob-name" type="text" placeholder="¿Cómo te llamas?" class="w-full p-4 bg-slate-100 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-green-500">
                            <div class="flex gap-4">
                                <input id="ob-weight" type="number" placeholder="Peso kg" class="w-full p-4 bg-slate-100 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-green-500">
                                <input id="ob-target" type="number" placeholder="Meta kg" class="w-full p-4 bg-slate-100 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-green-500">
                            </div>
                        </div>
                        <button onclick="handleStart()" class="w-full bg-green-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-green-600/20 active:scale-95 transition-all">COMENZAR AVENTURA</button>
                        <div class="mt-8">
                            ${getAuthorFooter(true)}
                        </div>
                    </div>
                `;
            }

            else if (window.state.screen === 'home') {
                container.innerHTML = `
                    <div class="flex-1 flex flex-col overflow-y-auto no-scrollbar pb-32">
                        <header class="p-6">
                            <div class="flex justify-between items-center mb-8">
                                <div class="flex items-center gap-3">
                                    <div class="w-12 h-12 bg-gradient-to-tr from-yellow-400 to-orange-500 rounded-full flex items-center justify-center font-bold text-slate-900 shadow-lg">LV ${p.level}</div>
                                    <p class="text-xl font-black">${p.name}</p>
                                </div>
                                <button onclick="navigate('weight')" class="glass-card px-4 py-2 rounded-xl flex items-center gap-2"><i data-lucide="scale" class="w-4 h-4 text-blue-400"></i><span class="font-bold text-sm">${p.weight}kg</span></button>
                            </div>
                            <div class="bg-gradient-to-br from-green-500 to-emerald-700 p-6 rounded-[2.5rem] shadow-2xl relative overflow-hidden mb-8">
                                <div class="relative z-10">
                                    <p class="text-white/80 text-[10px] font-bold uppercase mb-1">Misión de Hoy</p>
                                    <h3 class="text-xl font-bold mb-4">Hidratación Total</h3>
                                    <button onclick="navigate('calendar')" class="bg-white/20 text-white text-[10px] font-black py-2 px-4 rounded-full uppercase border border-white/10">Mi Plan 30 Días</button>
                                </div>
                                <i data-lucide="zap" class="absolute -right-6 -bottom-6 w-32 h-32 text-white/10 rotate-12"></i>
                            </div>
                        </header>
                        <section class="px-6 mb-8">
                            <h4 class="text-xs font-bold text-slate-500 mb-4 uppercase tracking-widest">Módulos</h4>
                            <div class="grid grid-cols-2 gap-4">
                                ${Object.keys(moduleData).map(key => `
                                    <button onclick="navigate('learning', '${key}')" class="glass-card p-5 rounded-[2rem] text-left active:scale-95 transition-all border border-white/5">
                                        <div class="w-10 h-10 bg-gradient-to-br ${moduleData[key].color} rounded-xl flex items-center justify-center mb-3 shadow-lg">
                                            <i data-lucide="${moduleData[key].icon}" class="w-5 h-5"></i>
                                        </div>
                                        <p class="font-bold text-sm">${moduleData[key].title}</p>
                                        <p class="text-[9px] text-slate-500 font-bold uppercase tracking-tight">Explorar</p>
                                    </button>
                                `).join('')}
                            </div>
                        </section>
                        ${getAuthorFooter()}
                    </div>
                    <nav class="absolute bottom-6 left-6 right-6 glass-card p-2 rounded-2xl flex justify-around border border-white/10 z-30">
                        <button onclick="navigate('home')" class="p-3 text-green-500"><i data-lucide="home"></i></button>
                        <button onclick="navigate('calendar')" class="p-3 text-slate-400"><i data-lucide="calendar"></i></button>
                        <button onclick="navigate('weight')" class="p-3 text-slate-400"><i data-lucide="scale"></i></button>
                        <button onclick="navigate('quiz')" class="p-3 text-slate-400"><i data-lucide="award"></i></button>
                    </nav>
                `;
            }

            else if (window.state.screen === 'learning') {
                const mod = moduleData[window.state.currentModule];
                container.innerHTML = `
                    <div class="flex-1 flex flex-col overflow-y-auto no-scrollbar module-animate">
                        <div class="p-6 flex items-center justify-between sticky top-0 bg-slate-900/80 backdrop-blur-md z-20">
                            <button onclick="navigate('home')" class="w-10 h-10 glass-card rounded-full flex items-center justify-center"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                            <h2 class="font-black text-lg uppercase tracking-widest leading-none">${mod.title}</h2>
                            <div class="w-10"></div>
                        </div>

                        <div class="p-6 pb-24">
                            <div class="video-container mb-8 shadow-2xl border border-white/10 bg-black">
                                <iframe 
                                    src="${mod.video}" 
                                    title="Reproductor de Video ACTIVA+" 
                                    frameborder="0" 
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                                    allowfullscreen>
                                </iframe>
                            </div>

                            <h4 class="text-xs font-bold text-slate-500 mb-4 uppercase tracking-widest">Consejos</h4>
                            <div class="space-y-3 mb-8">
                                ${mod.tips.map(tip => `
                                    <div class="glass-card p-4 rounded-2xl flex items-center gap-4 border border-white/5">
                                        <div class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_8px_#22c55e]"></div>
                                        <p class="text-sm text-slate-200">${tip}</p>
                                    </div>
                                `).join('')}
                            </div>

                            <div class="bg-gradient-to-br ${mod.color} p-6 rounded-[2rem] shadow-xl relative overflow-hidden mb-8">
                                <div class="relative z-10 text-white">
                                    <p class="text-[10px] font-black uppercase mb-2 opacity-80">Actividad</p>
                                    <p class="font-bold text-lg mb-6">${mod.activity}</p>
                                    <button onclick="completeModule('${window.state.currentModule}')" class="w-full bg-white text-slate-900 font-black py-4 rounded-xl shadow-lg active:scale-95 transition-all uppercase text-xs tracking-widest">Hecho +150 XP</button>
                                </div>
                                <i data-lucide="star" class="absolute -right-4 -bottom-4 w-24 h-24 text-white/10 rotate-12"></i>
                            </div>
                            ${getAuthorFooter()}
                        </div>
                    </div>
                `;
            }

            else if (window.state.screen === 'weight') {
                container.innerHTML = `
                    <div class="flex-1 flex flex-col p-8 overflow-y-auto no-scrollbar pb-32">
                        <button onclick="navigate('home')" class="w-10 h-10 glass-card rounded-full flex items-center justify-center mb-8"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                        <h2 class="text-4xl font-black mb-8 leading-tight">Mi Historial</h2>
                        <div class="glass-card p-10 rounded-[3rem] text-center mb-12 border border-white/5 relative overflow-hidden">
                            <p class="text-xs font-bold text-slate-500 uppercase mb-4 tracking-widest">Peso Actual</p>
                            <div class="text-7xl font-black mb-8 flex items-baseline justify-center gap-1">${p.weight}<span class="text-xl text-slate-600">kg</span></div>
                            <div class="flex justify-center gap-6">
                                <button onclick="changeWeight(-0.5)" class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center text-3xl font-bold shadow-xl active:scale-90 border border-white/5">-</button>
                                <button onclick="changeWeight(0.5)" class="w-16 h-16 bg-green-600 rounded-full flex items-center justify-center text-3xl font-bold shadow-xl active:scale-90 border border-green-500/50">+</button>
                            </div>
                        </div>
                        <div class="bg-blue-600/10 border border-blue-500/20 p-6 rounded-3xl mb-12">
                            <h4 class="font-bold text-blue-400 flex items-center gap-2 mb-2 text-sm"><i data-lucide="info" class="w-4 h-4"></i> Tip de Salud</h4>
                            <p class="text-sm text-slate-300 italic">"Pésate por la mañana antes de desayunar para obtener el dato más preciso."</p>
                        </div>
                        ${getAuthorFooter()}
                    </div>
                `;
            }

            else if (window.state.screen === 'calendar') {
                container.innerHTML = `
                    <div class="flex-1 flex flex-col p-8 overflow-y-auto no-scrollbar pb-32">
                        <button onclick="navigate('home')" class="w-10 h-10 glass-card rounded-full flex items-center justify-center mb-8"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                        <h2 class="text-4xl font-black mb-8 leading-tight">30 Días<br>Saludables</h2>
                        <div class="grid grid-cols-5 gap-3 mb-12">
                            ${p.calendar.map((done, i) => `
                                <div class="aspect-square rounded-2xl flex flex-col items-center justify-center transition-all ${done ? 'bg-green-600 text-white shadow-lg' : 'glass-card text-slate-600 border border-white/5'}">
                                    <span class="text-[8px] font-bold">DÍA</span>
                                    <span class="text-lg font-black">${i + 1}</span>
                                    ${done ? '<i data-lucide="check" class="w-3 h-3 mt-1"></i>' : ''}
                                </div>
                            `).join('')}
                        </div>
                        ${getAuthorFooter()}
                    </div>
                `;
            }

            lucide.createIcons();
        };

        window.handleStart = () => {
            const name = document.getElementById('ob-name').value;
            const weight = parseFloat(document.getElementById('ob-weight').value);
            const target = parseFloat(document.getElementById('ob-target').value);
            if (name && weight) window.saveProfile({ name, weight, targetWeight: target || weight - 2 });
        };

        window.changeWeight = (val) => {
            const newWeight = Math.round((window.state.profile.weight + val) * 10) / 10;
            window.saveProfile({ weight: Math.max(20, newWeight) });
        };

        window.completeModule = (id) => {
            let { xp, level, completedModules } = window.state.profile;
            if (!completedModules.includes(id)) {
                completedModules.push(id);
                xp += 150;
                if (xp >= 500) { xp = 0; level++; }
                window.saveProfile({ xp, level, completedModules });
            }
            navigate('home');
        };

        init();
    </script>
</body>
</html>
